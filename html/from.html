<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <fieldset>
        <legend>complete HTML from</legend>

        <center>
           <table>
            
            <h3>Complite HTML Form Example</h3>
            <tr>
                <td><label for="Name">Name :</label></td>
                <td><input type="text"></td>
            </tr>

            <tr>
                <td><label for="Password">Password :</label></td>
                <td><input type="password"></td>
            </tr>
            <tr>
                <td><label >Email :</label></td>
                <td><input type="email" required placeholder="enter email"></td>
            </tr>
            <tr>
                <td><label for="Age">Age :</label></td>
                <td><input type="age"></td>
            </tr>
            <tr>
                <td><label for="Phone">Phone :</label></td>
                <td><input type="tel"></td>
            </tr>
            <tr>
                <td><label for="Website">Website :</label></td>
                <td><input type="url"></td>
            </tr>
            <tr>
                <td><label for="Date">Date of Birth :</label></td>
                <td><input type="date"></td>
            </tr>
            <tr>
                <td><label for="">Preferred Time :</label></td>
                <td><input type="time"></td>
            </tr>
            <tr>
                <td><label for="color"> Favorite Color:</label></td>
                <td><input type="color"></td>
            </tr>
            <tr>
                <td><label for="Name">Rating :</label></td>
                <td><input type="range"></td>
            </tr>
            <tr>
                <td><label >gender :</label></td>
                <td><input type="radio" name=" gen">male 
                    <input type="radio" name="gen">female</td>
            </tr>
            <tr>
                <td><label for="">Hobbies</label></td>
                <td><input type="checkbox">reading
                <input type="checkbox">music
                <input type="checkbox">coding</td>
            </tr>
            <tr>
                <td><label for="">upload file</label></td>
                <td><input type="file"></td>
            </tr>
            <tr>
                <td><label for="">Message</label></td>
                <td><textarea name="" id="" cols="30" rows="5"></textarea></td>
            </tr>
            <tr>
                <td><label for="">Country</label></td>
                <td><select name="" id="">
                <option value="">india</option>
                <option value="">Chaina</option>
                <option value="">USA</option>
                 </select></td>
            </tr>
            <tr> 
                <td><input type="submit"  value="submit"></td>
            </tr>
           </table>
        </center>
    </fieldset>
