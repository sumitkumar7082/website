    .card {
        width: 300px;
        height: 400px;
        border: 1px solid #ccc;
        border-radius: 5px;
        padding: 16px;
        text-align: center;
        margin-top: 20px;
        transition: 0.3s;
        background-color: lightgray;
    }
    .card:hover {
        transform: scale(1.1);
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    }
    .card img {
        width: 100%;
        height: auto;
        border-radius: 5px;
    }
